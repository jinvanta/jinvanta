<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <symbol id="mandala" viewBox="0 0 200 200">
      <g fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="100" cy="100" r="92"/>
        <circle cx="100" cy="100" r="78" stroke-dasharray="3 5"/>
        <circle cx="100" cy="100" r="58"/>
        <circle cx="100" cy="100" r="40" stroke-dasharray="2 4"/>
      </g>
      <g fill="currentColor">
        <!-- 12 lotus petals -->
        <g id="petal-group">
          <path d="M100 12c6 10 6 22 0 30-6-8-6-20 0-30z"/>
        </g>
        <use href="#petal-group" transform="rotate(30 100 100)"/>
        <use href="#petal-group" transform="rotate(60 100 100)"/>
        <use href="#petal-group" transform="rotate(90 100 100)"/>
        <use href="#petal-group" transform="rotate(120 100 100)"/>
        <use href="#petal-group" transform="rotate(150 100 100)"/>
        <use href="#petal-group" transform="rotate(180 100 100)"/>
        <use href="#petal-group" transform="rotate(210 100 100)"/>
        <use href="#petal-group" transform="rotate(240 100 100)"/>
        <use href="#petal-group" transform="rotate(270 100 100)"/>
        <use href="#petal-group" transform="rotate(300 100 100)"/>
        <use href="#petal-group" transform="rotate(330 100 100)"/>
      </g>
    </symbol>
  </defs>
  <use href="#mandala"/>
</svg>
